<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12c08f"/>
      <stop offset="0.55" stop-color="#0ba5c9"/>
      <stop offset="1" stop-color="#0a82d8"/>
    </linearGradient>
    <radialGradient id="hl" cx="0.32" cy="0.27" r="0.78">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed brand background (safe for maskable masking) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#hl)"/>

  <!-- Globe / lens motif, centered within the maskable safe zone -->
  <g transform="translate(512,512)" stroke="#ffffff" stroke-width="30" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
    <circle r="232"/>
    <line x1="0" y1="-232" x2="0" y2="232"/>
    <line x1="-232" y1="0" x2="232" y2="0"/>
    <ellipse rx="116" ry="232"/>
    <path d="M-214 -84 Q 0 -22 214 -84"/>
    <path d="M-214 84 Q 0 22 214 84"/>
  </g>
</svg>
